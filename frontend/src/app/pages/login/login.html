<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <i class="pi pi-comments"></i>
      <h1>ChatApp</h1>
      <p>Entre pra continuar conversando</p>
    </div>

    <div class="login-form">
      <div class="field">
        <label for="email">E-mail</label>
        <p-iconfield>
          <p-inputicon styleClass="pi pi-envelope" />
          <input pInputText id="email" placeholder="seu@email.com" />
        </p-iconfield>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <p-iconfield>
          <p-inputicon styleClass="pi pi-lock" />
          <input pInputText id="senha" type="password" placeholder="••••••••" />
        </p-iconfield>
        <a class="forgot">Esqueci minha senha</a>
      </div>

      <p-button label="Entrar" styleClass="w-full" />

      <p-divider align="center">
        <span>ou continue com</span>
      </p-divider>

    </div>

    <p class="register-link">
      Não tem conta? <a>Cadastre-se</a>
    </p>

  </div>
</div>
