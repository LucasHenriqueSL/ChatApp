<div class="login-container">
  <div class="login-card">

    <div class="login-header">
    <i class="pi pi-user-plus"></i>
      <h1>Criar Conta</h1>
      <p>Leva menos de 1 minuto</p>
    </div>


        <div class="login-form">

                <div class="field">
        <label for="nomeUser">Nome de usuário</label>
        <div class="input-wrapper">
    <i class="pi pi-at input-icon"></i>
          <input pInputText id="nomeUser" placeholder="ex: joao_silva" required />
        </div>
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <i class="pi pi-envelope input-icon"></i>
          <input pInputText id="email" placeholder="seu@email.com" required />
        </div>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrapper">
          <i class="pi pi-lock input-icon"></i>
          <input pInputText id="senha" type="password" placeholder="••••••••" required />
        </div>
        <a class="forgot">Esqueci minha senha</a>
      </div>


    </div>

  </div>
</div>
